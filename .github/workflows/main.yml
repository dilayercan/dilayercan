name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the master branch
  push:
    branches:
    - master
    
  

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dilayercan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          
      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file>
https://www.youtube.com/redirect?event=comments&redir_token=QUFFLUhqa3ZJaGZkZDhIYW80eUpjRzFFdV8xaTEtY1dpQXxBQ3Jtc0ttck9IYXFTRzZuN084SmFLY1U4TXFrM0p5MEZYRlE0YlNIWmUtQ0F6S0FtdWJQMENueFUzblJhQzBmWFNvcUtpZi0wQVE4VjhxNjVvVEVzS3d2RS1DYXZhb2Yza1dGM3UtYlhScXlLTFVNXzdjcXRTVQ&q=https%3A%2F%2Fraw.githubusercontent.com%2F%253Cgithub_user%253E%2F%253Crepository%253E%2F%253Ctarget_branch%253E%2F%253Cfile%253E&stzid=Ugz7VpDqdJk5KnTZYTl4AaABAg , or as github page
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
